name: Windows Desktop Package

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  package-windows-desktop:
    name: Package Windows Desktop
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set Up Gradle Cache
        uses: gradle/actions/setup-gradle@v4

      - name: Package EXE
        run: .\android-app\gradlew.bat -p .\desktop-app clean packageReleaseExe

      - name: Dump jpackage logs on failure
        if: failure()
        run: |
          $logRoot = ".\desktop-app\build\compose\logs"
          $tmpRoot = ".\desktop-app\build\compose\tmp"
          Write-Host "Dumping compose logs from: $logRoot"
          if (Test-Path $logRoot) {
            Get-ChildItem -Path $logRoot -Recurse -File | ForEach-Object {
              Write-Host "===== $($_.FullName) ====="
              Get-Content -Path $_.FullName
            }
          } else {
            Write-Host "Compose log directory not found."
          }

          Write-Host "Dumping jpackage args from: $tmpRoot"
          if (Test-Path $tmpRoot) {
            Get-ChildItem -Path $tmpRoot -Recurse -File -Filter "*.args.txt" | ForEach-Object {
              Write-Host "===== $($_.FullName) ====="
              Get-Content -Path $_.FullName
            }
          } else {
            Write-Host "Compose tmp directory not found."
          }

      - name: Verify Windows Installer
        run: |
          $installers = Get-ChildItem -Path ".\desktop-app\build\compose\binaries" -Recurse -File |
            Where-Object { $_.Extension -eq ".exe" }
          if (-not $installers) {
            throw "No Windows EXE installer artifacts were produced."
          }
          $installers | ForEach-Object { Write-Host "Produced installer: $($_.FullName)" }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop-exe-installer
          path: |
            desktop-app/build/compose/binaries/**/*.exe
          if-no-files-found: error

      - name: Publish Release Assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop-app/build/compose/binaries/**/*.exe
          generate_release_notes: true
